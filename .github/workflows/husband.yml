name: husband
on:
  push:
    branches: [ "main" ]

jobs:
    gosh_within_gee:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: gosh_within_gee
          run: |
            npm install
            timeout 340m node husband.js
  
