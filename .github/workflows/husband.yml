name: husband
on:
  push:
    branches: [ "main" ]

jobs:
    dwell_um_woot:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: dwell_um_woot
          run: |
            npm install
            timeout 305m node husband.js
  
